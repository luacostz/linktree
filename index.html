<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Link</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/4b8b9a8b7a.js" crossorigin="anonymous"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#346a40,#8fd199);

color:white;

}

.container{

width:340px;
text-align:center;

backdrop-filter:blur(20px);

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

.profile{

width:110px;
height:110px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

margin-bottom:15px;

}

h1{

font-size:22px;
margin-bottom:5px;

}

.bio{

opacity:.8;
font-size:14px;
margin-bottom:30px;

}

.links{

display:flex;
flex-direction:column;
gap:14px;

}

.link{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

text-decoration:none;

color:white;

padding:14px;

border-radius:12px;

background:rgba(255,255,255,0.15);

transition:.3s;

font-weight:500;

}

.link:hover{

background:white;

color:#333;

transform:translateY(-3px) scale(1.03);

}

.social{

margin-top:25px;

display:flex;
justify-content:center;
gap:18px;

font-size:20px;

}

.social a{

color:white;

transition:.3s;

}

.social a:hover{

transform:scale(1.2);

}

.footer{

margin-top:25px;

font-size:12px;

opacity:.6;

}

</style>

</head>

<body>

<div class="container">

<img class="profile" src="4e2f0150-550d-4ae3-aa0b-18d097de7030.jpg">

<h1>Rafael Dorneles</h1>

<p class="bio">
Sou o melhor namorado, drifter e psicologo
</p>

<div class="links">

<a class="link" href="https://www.instagram.com/psi.rafaeldorneles/" target="_blank">
<i class="fab fa-instagram"></i>
Instagram profissional
</a>

<a class="link" href="https://www.youtube.com/channel/UCeSXwxjAejTksXfXZFVA4Pw" target="_blank">
<i class="fab fa-youtube"></i>
Para mover em silencio
</a>

<a class="link" href="https://www.instagram.com/luanacostz/" target="_blank">
<i class="fab fa-instagram"></i>
Minha namorada
</a>

<a class="link" href="https://www.youtube.com/watch?v=iMgo7Yw-Uu0" target="_blank">
<i class="fab fa-youtube"></i>
Meu carro
</a>


</div>

<div class="social">

<a href="#"><i class="fab fa-instagram"></i></a>

<a href="#"><i class="fab fa-youtube"></i></a>

</div>

<div class="footer">

</div>

</div>

</body>

</html>
